document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-content:space-between;padding:0 clamp(20px,5vw,64px);border-bottom:1px solid rgba(21,21,21,.1)\">\n      <a onclick=\"{{ goCover }}\" aria-label=\"Leonid Capital Partners, home\" style=\"cursor:pointer;display:flex;align-items:center;color:#151515;transition:color .25s ease\" style-hover=\"color:#555\"><span style=\"font-weight:700;font-size:13px;letter-spacing:.02em;line-height:1.15\">Leonid Capitol<br>Partners<\u002Fspan><\u002Fa>\n      <button onclick=\"{{ closeMenu }}\" aria-label=\"Close menu\" style=\"position:relative;width:42px;height:42px;border:none;background:none;cursor:pointer;color:#151515;transition:color .25s ease\" style-hover=\"color:#555\">\n        <span style=\"position:absolute;top:50%;left:9px;right:9px;height:1.6px;background:currentColor;transform:translateY(-50%) rotate(45deg)\"><\u002Fspan>\n        <span style=\"position:absolute;top:50%;left:9px;right:9px;height:1.6px;background:currentColor;transform:translateY(-50%) rotate(-45deg)\"><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <nav style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(20px,4vw,72px) clamp(20px,5vw,64px)\">\n      <div style=\"font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#9a9a9a;margin-bottom:clamp(14px,2vh,26px)\">Navigate<\u002Fdiv>\n      <sc-for list=\"{{ menuItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <a onclick=\"{{ item.go }}\" style=\"display:flex;align-items:center;gap:clamp(16px,2vw,30px);padding:clamp(10px,1.5vh,18px) 16px;margin:0 -16px;border-top:1px solid rgba(21,21,21,.1);cursor:pointer;transition:padding-left .4s cubic-bezier(.2,.7,.2,1), color .25s ease, background .4s ease;color:#151515\" style-hover=\"padding-left:30px;color:#555;background:#f4f4f4\">\n          <span style=\"font-size:13px;color:#9a9a9a;width:30px;flex:none\">{{ item.number }}<\u002Fspan>\n          <span style=\"font-size:clamp(28px,6vw,60px);text-transform:uppercase;letter-spacing:.005em;line-hei yebrow .85s cubic-bezier(.16,.8,.24,1) both\">OUR<\u002Fdiv>\n      <h1 style=\"position:relative;z-index:1;margin:0;font-weight:400;font-size:clamp(44px,7.4vw,108px);line-height:.96;letter-spacing:.004em;text-transform:uppercase;color:#151515;animation:lcpHeadRise 1.05s cubic-bezier(.16,.8,.24,1) .07s both\">{{ section.title }}<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"margin-top:clamp(54px,9vh,96px);display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:clamp(28px,4vw,56px);align-items:start\">\n      <p data-reveal=\"\" style=\"margin:0;font-size:clamp(15px,1.1vw,17px);line-height:1.62;color:#2a2a2a;text-wrap:pretty\">{{ section.col1 }}<\u002Fp>\n      <p data-reveal=\"\" style=\"margin:0;font-size:clamp(15px,1.1vw,17px);line-height:1.62;color:#2a2a2a;text-wrap:pretty\">{{ section.col2 }}<\u002Fp>\n      <div data-reveal=\"\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <sc-for list=\"{{ section.contacts }}\" as=\"c\" hint-placeholder-count=\"1\">\n          <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding-left:0;border-left:1px solid transparent;transition:padding-left .45s cubic-bezier(.2,.7,.2,1), border-color .45s ease\" style-hover=\"padding-left:18px;border-left-color:#151515\">\n            <sc-if value=\"{{ c.org }}\" hint-placeholder-val=\"\"><div style=\"font-weight:500;font-size:14.5px;color:#151515\">{{ c.org }}<\u002Fdiv><\u002Fsc-if>\n            <div style=\"font-weight:500;font-size:15px;color:#151515\">{{ c.name }}<\u002Fdiv>\n            <sc-if value=\"{{ c.role }}\" hint-placeholder-val=\"\"><div style=\"font-size:14px;color:#9a9a9a\">{{ c.role }}<\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ c.emailHref }}\" hint-placeholder-val=\"\"><a href=\"{{ c.emailHref }}\" style=\"font-size:14px;color:#151515;font-weight:500;margin-top:6px;padding-bottom:2px;background-image:linear-gradient(#555,#555);background-size:0% 1px;background-position:0 100%;background-repeat:no-repeat;transition:background-size .45s cubic-bezier(.2,.7,.2,1), color .25s ease\" style-hover=\"color:#555;background-size:100% 1px\">{{ c.email }}<\u002Fa><\u002Fsc-if>\n            <sc-if value=\"{{ c.webHref }}\" hint-placeholder-val=\"\"><a href=\"{{ c.webHref }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:14px;color:#151515;padding-bottom:2px;background-image:linear-gradient(#555,#555);background-size:0% 1px;background-position:0 100%;background-repeat:no-repeat;transition:background-size .45s cubic-bezier(.2,.7,.2,1), color .25s ease\" style-hover=\"color:#555;background-size:100% 1px\">{{ c.web }}<\u002Fa><\u002Fsc-if>\n            <sc-if value=\"{{ c.logo }}\" hint-placeholder-val=\"\"><div style=\"font-weight:700;font-size:18px;letter-spacing:.01em;margin-top:12px;color:#151515\">{{ c.logo }}<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"margin-top:clamp(64px,11vh,120px);padding-top:30px;border-top:1px solid rgba(21,21,21,.12);display:flex;align-items:flex-start;justify-content:space-between;gap:20px\">\n      <div style=\"flex:1\">\n        <sc-if value=\"{{ section.hasPrev }}\" hint-placeholder-val=\"{{ false }}\"><a onclick=\"{{ section.prevGo }}\" style=\"cursor:pointer;display:inline-flex;flex-direction:column;gap:5px;transition:color .25s ease, transform .45s cubic-bezier(.2,.7,.2,1)\" style-hover=\"color:#555;transform:translateX(-8px)\"><span style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#9a9a9a\">Previous<\u002Fspan><span style=\"font-size:clamp(16px,1.7vw,22px);text-transform:uppercase;letter-spacing:.01em\">← {{ section.prevLabel }}<\u002Fspan><\u002Fa><\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"flex:1;text-align:right\">\n        <sc-if value=\"{{ section.hasNext }}\" hint-placeholder-val=\"{{ false }}\"><a onclick=\"{{ section.nextGo }}\" style=\"cursor:pointer;display:inline-flex;flex-direction:column;gap:5px;align-items:flex-end;transition:color .25s ease, transform .45s cubic-bezier(.2,.7,.2,1)\" style-hover=\"color:#555;transform:translateX(8px)\"><span style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#9a9a9a\">Next<\u002Fspan><span style=\"font-size:clamp(16px,1.7vw,22px);text-transform:uppercase;letter-spacing:.01em\">{{ section.nextLabel }} →<\u002Fspan><\u002Fa><\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:860},&quot;heroMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;scrollReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;pageNumbers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'cover', menuOpen: false };\n\n  get data() {\n    var apple1 = \"Apple Law Firm PLLC provides specialized legal counsel for government contractors, defense technology companies, and innovative businesses operating at the intersection of commercial markets and federal procurement.\";\n    var apple2 = \"Led by Alan Apple, a former senior military acquisition attorney with more than 23 years of service in the U.S. Navy and Army, the firm helps companies navigate the full government contracting lifecycle, including SBIR/STTR programs, Other Transaction Agreements (OTAs), contract negotiations, intellectual property and data rights, claims, protests, and regulatory compliance.\";\n    return {\n      sections: {\n        advisors: {\n          title: 'Board of Advisors', number: '',\n          col1: \"Building the right board and advisory team can be a critical accelerator for growth. Through Leonid Capital Partners' extensive network of military leaders, government officials, industry executives, investors, and operators, we can help connect portfolio companies with experienced board members and advisors aligned with their stage, sector, and strategic objectives.\",\n          col2: \"While we do not maintain a formal roster, we regularly facilitate introductions to individuals with deep expertise across defense, aerospace, government contracting, technology, finance, and business operations. Our own Board of Advisors serves as an example of the caliber of leaders within our network, offering decades of experience in national security, government, entrepreneurship, and corporate leadership.\",\n          contacts: [\n            { name: 'James Parker', role: 'Co-founding Partner', email: 'james@leonidcp.com' },\n            { name: 'Chris Lay', role: 'Co-founding Partner', email: 'chris@leonidcp.com' }\n          ]\n        },\n        legal: {\n          title: 'Legal', number: '01',\n          col1: apple1 + \" Led by Alan Apple, a former senior military acquisition attorney with more than 23 years of service in the U.S. Navy and Army, the firm helps companies navigate the full government contracting lifecycle, including SBIR/STTR programs, Other Transaction Agreements (OTAs), contract negotiations, intellectual property and data rights, claims, protests, and regulatory compliance.\",\n          col2: \"Beyond traditional government contracts support, Apple Law works with founders and executives to align legal strategy with long-term enterprise value creation. The firm integrates contract strategy, IP protection, asset protection, business succession planning, and estate planning into a cohesive framework designed to help companies scale, attract investment, commercialize dual-use technologies, and protect the value they have built. Apple Law is particularly valuable for businesses advancing through SBIR/STTR phases, pursuing TACFI or STRATFI opportunities.\",\n          contacts: [ { org: 'Apple Law Firm', name: 'Alan Apple', email: 'alan@applelaw.us' } ]\n        },\n        insurance: {\n          title: 'Insurance', number: '02',\n          col1: apple1, col2: apple2,\n          contacts: [ { org: 'Eagle Law', name: 'Mike Segal', email: 'allen.ngo@alliant.com' } ]\n        },\n        banking: {\n          title: 'Banking', number: '03',\n          col1: apple1, col2: apple2,\n          contacts: [ { name: 'Allen Ngo, Senior Vice President,', email: 'allen.ngo@alliant.com' } ]\n        },\n        marketing: {\n          title: 'Marketing & Design', number: '04',\n          col1: \"Tracker + Scout helps organizations build stronger brands and communicate more effectively with the audiences that matter most. Their team combines strategic planning, creative development, and marketing execution to help companies establish a clear market presence and support long-term growth objectives. Services include brand strategy, messaging development, visual identity design, website design and development, content creation, digital marketing, social media management, and event support. Working as an extension of their clients' teams.\",\n          col2: \"From developing a company's foundational brand identity to executing ongoing campaigns and digital initiatives, they provide both strategic guidance and hands-on execution across the marketing lifecycle. Their collaborative approach allows growing companies to access experienced marketing, design, and communications resources without building a large in-house team. By combining research, storytelling, creative design, and digital expertise, Tracker + Scout helps organizations increase visibility, build credibility.\",\n          contacts: [ { name: 'Lucky Loncar', email: 'lucky@trackerandscout.com', web: 'trackerandscout.com', logo: 'TRACKER+SCOUT' } ]\n
